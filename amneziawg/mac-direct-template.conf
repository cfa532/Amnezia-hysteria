[Interface]
PrivateKey = <DEVICE_PRIVATE_KEY>
Address = 10.8.0.<N>/32
DNS = 8.8.8.8, 1.1.1.1
MTU = 1280

# AmneziaWG obfuscation — must match server values exactly
Jc = 4
Jmin = 40
Jmax = 70
S1 = 30
S2 = 40
S3 = 30
S4 = 40
H1 = 11223
H2 = 44556
H3 = 77889
H4 = 99001

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
Endpoint = <YOUR_DOMAIN>:443
# Split-route: avoids macOS 26.5 sendmsg bug where 0.0.0.0/0 makes utun the
# default route before handshake, causing EADDRNOTAVAIL on the handshake itself.
# This covers all IPv4 and IPv6 traffic without setting a single default route.
AllowedIPs = 0.0.0.0/1, 128.0.0.0/1, ::/1, 8000::/1
PersistentKeepalive = 25
