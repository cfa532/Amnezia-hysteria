[Interface]
PrivateKey = <DEVICE_PRIVATE_KEY>
Address = 10.8.0.<N>/32          # Unique VPN IP per device
DNS = 10.8.0.1                   # VPN server provides DNS
MTU = 1280

# AmneziaWG obfuscation parameters — must match server
Jc = 4
Jmin = 40
Jmax = 70
S1 = 30
S2 = 40
S3 = 30
S4 = 40
H1 = 11223
H2 = 44556
H3 = 77889
H4 = 99001

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
# Endpoint points to local Hysteria2 listener, NOT the server directly.
# Hysteria2 forwards UDP from this port to the server's AmneziaWG port (51820).
# device1: 1443, device2: 1444 (different ports if both run on same host)
Endpoint = 127.0.0.1:1443

# Split tunnel — route all traffic through VPN EXCEPT the Hysteria2 server IPs.
# Server IPs MUST be excluded or Hysteria2's QUIC packets get captured by
# WireGuard, creating an infinite routing loop.
#
# Generate the AllowedIPs split-tunnel list at:
#   https://www.procustodibus.com/blog/2021/03/wireguard-allowedips-calculator/
# Exclude: <PRIMARY_SERVER_IP>/32 and <BACKUP_SERVER_IP>/32
AllowedIPs = 0.0.0.0/1, 128.0.0.0/2, 192.0.0.0/9, 192.128.0.0/11, \
             192.160.0.0/13, 192.169.0.0/16, 192.170.0.0/15, \
             192.172.0.0/14, 192.176.0.0/12, 192.192.0.0/10, \
             193.0.0.0/8, 194.0.0.0/7, 196.0.0.0/6, 200.0.0.0/5, \
             208.0.0.0/4
             # ... (complete list depends on your server IPs)

PersistentKeepalive = 25
