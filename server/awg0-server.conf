[Interface]
Address = 10.8.0.1/24
ListenPort = 443
PrivateKey = <SERVER_PRIVATE_KEY>

# AmneziaWG obfuscation — must match client values exactly
Jc = 4
Jmin = 40
Jmax = 70
S1 = 30
S2 = 40
S3 = 30
S4 = 40
H1 = 11223
H2 = 44556
H3 = 77889
H4 = 99001

# Use -I FORWARD 1 (insert before UFW chains) NOT -A FORWARD (appends after UFW,
# which silently drops forwarded packets when UFW default forward policy is DROP).
PostUp = iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE
PostUp = iptables -I FORWARD 1 -i awg0 -j ACCEPT
PostUp = iptables -I FORWARD 1 -o awg0 -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i awg0 -j ACCEPT
PostDown = iptables -D FORWARD -o awg0 -j ACCEPT

# Add one [Peer] block per client device.
# All servers must carry the same peer list — clients may hit any server via DNS.
# Same SERVER_PRIVATE_KEY on all servers so clients see one consistent pubkey.

[Peer]
# <device-name>
PublicKey = <DEVICE_PUBLIC_KEY>
AllowedIPs = 10.8.0.<N>/32
