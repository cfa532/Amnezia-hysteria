# Hysteria2 server farm — single source of truth for all server scripts
# Format (tab or space separated):
#   <ip>   <region>   <port>
#
# Adding a server:
#   1. Append a line here
#   2. Copy this file to the new server at /usr/local/etc/hysteria/servers.conf
#   3. Copy this file to each client at ~/Library/Application Support/hysteria/servers.conf
#   4. Set MY_IP on the new server's hysteria-failover.sh
#   No other changes are needed.

<SERVER_1_IP>   singapore   443
<SERVER_2_IP>   backup      443
