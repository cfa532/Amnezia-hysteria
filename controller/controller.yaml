# VPN controller configuration
# Deploy to /etc/vpn-controller/controller.yaml on the controller server.
# Currently running on tn1 (43.165.128.251).

dns:
  cf_api_token: "<CF_API_TOKEN>"
  cf_zone_id: "<CF_ZONE_ID>"
  record_name: "nebuchadnezzar.fireshare.uk"
  ttl: 60

check_interval: 30       # seconds between health check rounds
fail_threshold: 3        # consecutive SSH failures before removing from DNS
recover_threshold: 2     # consecutive successes before adding back to DNS

regions:
  asia:
    servers: [tn1, minipc]

# Shared AWG identity — all servers use this same keypair.
awg:
  shared_privkey: "<SHARED_AWG_PRIVATE_KEY>"
  shared_pubkey:  "<SHARED_AWG_PUBLIC_KEY>"
  client_subnet:  "10.8.1.0/24"   # tn1 clients; minipc owns 10.8.0.0/24

servers:
  - name: tn1
    ip: "<TN1_IP>"
    region: asia
    max_peers: 50
    ssh_pass: "<ROOT_SSH_PASSWORD>"

  - name: minipc
    ip: "<MINIPC_IP>"
    region: asia
    max_peers: 50
    ssh_user: pi
    ssh_port: 220
    ssh_key: /etc/vpn-controller/minipc-key
